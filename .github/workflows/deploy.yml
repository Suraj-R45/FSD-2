name: Full CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

# -------------------------
# 1. BACKEND TEST
# -------------------------
jobs:
  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Experiment_20/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -v .


# -------------------------
# 2. FRONTEND TEST
# -------------------------
  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Experiment_20/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: Experiment_20/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test || echo "No frontend tests found, skipping"


# -------------------------
# 3. DOCKER PUBLISH
# -------------------------
  docker-publish:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/backend-app" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: Experiment_20/backend
          file: Experiment_20/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}


# -------------------------
# 4. DEPLOY CONTAINER
# -------------------------
  docker-container:
    runs-on: ubuntu-latest
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ${{ needs.docker-publish.outputs.image }}:${{ needs.docker-publish.outputs.tag }}

      - name: Run container
        run: |
          docker run -d --name backend-container -p 5000:5000 \
          ${{ needs.docker-publish.outputs.image }}:${{ needs.docker-publish.outputs.tag }}

      - name: Wait for API (health check)
        run: |
          for i in {1..10}; do
            curl --fail http://127.0.0.1:5000/ && exit 0
            echo "Waiting for API..."
            sleep 3
          done
          echo "API failed to start"
          exit 1

      - name: Show logs if failure
        if: failure()
        run: docker logs backend-container

      - name: Cleanup container
        if: always()
        run: docker rm -f backend-container || true