name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  backend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      working-directory: Experiment_20/backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run backend (start server)
      working-directory: Experiment_20/backend
      run: |
        python run.py &
        echo $! > backend.pid

    - name: Wait for backend API
      run: |
        for i in {1..10}; do
          curl --fail http://127.0.0.1:5000/students && exit 0
          echo "Waiting for backend..."
          sleep 3
        done
        exit 1

    - name: Stop backend server
      run: kill $(cat Experiment_20/backend/backend.pid)

    - name: Build Backend Docker Image
      working-directory: Experiment_20/backend
      run: docker build -t backend-app .


  frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"
        cache: "npm"
        cache-dependency-path: Experiment_20/frontend/package-lock.json

    - name: Install dependencies
      working-directory: Experiment_20/frontend
      run: npm ci

    - name: Build Frontend
      working-directory: Experiment_20/frontend
      run: npm run build

    - name: Build Frontend Docker Image
      working-directory: Experiment_20/frontend
      run: docker build -t frontend-app .